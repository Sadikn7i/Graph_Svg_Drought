  <script>
    function downloadSVG() {
      const svg = document.getElementById('mainSVG');
      const serializer = new XMLSerializer();
      const svgStr = serializer.serializeToString(svg);
      const blob = new Blob([svgStr], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'graphical_abstract.svg';
      a.click();
      URL.revokeObjectURL(url);
    }

    function downloadRaster(format) {
      const svg = document.getElementById('mainSVG');
      const serializer = new XMLSerializer();
      const svgStr = serializer.serializeToString(svg);

      const W = 1328, H = 531;
      const scale = 2; // 2x for crisp high-res output

      const canvas = document.createElement('canvas');
      canvas.width  = W * scale;
      canvas.height = H * scale;
      const ctx = canvas.getContext('2d');

      // White background (required for JPG, good for PNG too)
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.scale(scale, scale);

      const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
      const url  = URL.createObjectURL(blob);
      const img  = new Image();

      img.onload = function () {
        ctx.drawImage(img, 0, 0, W, H);
        URL.revokeObjectURL(url);

        const mimeType = format === 'png' ? 'image/png' : 'image/jpeg';
        const quality  = format === 'jpg' ? 0.95 : undefined;
        const dataURL  = canvas.toDataURL(mimeType, quality);

        const a = document.createElement('a');
        a.href = dataURL;
        a.download = 'graphical_abstract.' + format;
        a.click();
      };

      img.onerror = function () {
        alert('Rendering failed. Please open this file in Chrome or Edge for PNG/JPG export.');
      };

      img.src = url;
    }
  </script>

</body>
</html>
